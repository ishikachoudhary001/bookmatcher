{% extends 'base.html' %}
{% block content %}
<div class="popular-books">
    <h1>🔥 Popular Books Right Now</h1>
    <div class="book-grid">
        {% for book in popular_books %}
        <div class="book-card" onclick="window.location.href='{{ url_for('book_detail', book_id=book['_id']) }}'">
            <img src="{{ book['cover_url'] }}" alt="{{ book['title'] }}">
            <div class="book-info">
                <h3>{{ book['title'] }}</h3>
                <p>❤️ {{ book['likes'] }} Likes</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
